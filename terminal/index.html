<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="terminal.css">
</head>
<body>

<div class="terminal">
    <div class="title-bar">
        <span class="button close"></span>
        <span class="button minimize"></span>
        <span class="button zoom"></span>
    </div>
    <div class="terminal-content">
        <div class="line"><span class="typing">$ echo "Hello, World!"</span></div>
        <div class="line"><span class="typing">Hello, World!</span></div>
        <div class="line"><span class="typing">$</span></div>
    </div>
</div>

</body>
</html>

<link rel="stylesheet" href="terminal.css">
