 <section class="contact-forum">
        <h2>Contact Us</h2>
        <p>Fill in the details if you are interested in working with us. we will resond back to you in 5 working days at most</p>
        <form class="contact-form" action="#" method="post">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" placeholder="Your full name" required>

            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required>

            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="tel" placeholder="(123) 456-7890">

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="4" placeholder="tell us about yourself" required></textarea>

            <button type="submit">Send Message</button>
        </form>
    </section>
