<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Terminal Animation</title>
<style>
/* Terminal window styling */
.terminal {
    background-color: #1e1e1e;
    color: #00ff88;
    font-family: monospace;
    padding: 36px 20px 20px 10px;
    border-radius: 8px;
    width: 600px;
    max-width: 90%;
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
    position: relative;
    overflow: hidden;
}

/* Fake title bar */
.title-bar {
    height: 16px;
    background-color: #2d2d2d;
    border-radius: 8px 8px 0 0;
    display: flex;
    align-items: center;
    padding-left: 6px;
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
}

.button {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
}

.close {
    background-color: #ff5f56;
}

.minimize {
    background-color: #ffbd2e;
}

.zoom {
    background-color: #27c93f;
}

</style>
</head>
<body>
<center>
<div class="terminal">
    <div class="title-bar">
        <span class="button close"></span>
        <span class="button minimize"></span>
        <span class="button zoom"></span>
    </div>
    <div>
        &gt; echo "Hello, World!"
    </div>
</div>

</body>
</html>
</center>
